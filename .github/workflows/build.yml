name: Build Windows release

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build application
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onedir --windowed `
            --name QuickFinder `
            --icon quickfinder.ico `
            --add-data "check.svg;." `
            --version-file version_info.txt `
            --distpath release\dist-onedir `
            --workpath release\build-onedir `
            --specpath release\spec-onedir `
            quick_finder.pyw
          New-Item -ItemType Directory -Path release\dist-onedir\QuickFinder\licenses -Force | Out-Null
          Copy-Item licenses\* release\dist-onedir\QuickFinder\licenses -Recurse -Force
          Copy-Item THIRD_PARTY_LICENSES.md release\dist-onedir\QuickFinder\licenses -Force

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build installer and checksum
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release\installer-nsis -Force | Out-Null
          & "C:\Program Files (x86)\NSIS\makensis.exe" /INPUTCHARSET UTF8 quickfinder_installer.nsi
          $installer = "release\installer-nsis\QuickFinder_Setup_2.1.0.exe"
          $hash = (Get-FileHash -Algorithm SHA256 $installer).Hash.ToLower()
          "$hash  QuickFinder_Setup_2.1.0.exe" | Set-Content -Encoding ascii release\installer-nsis\SHA256SUMS.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickFinder-Windows-2.1.0
          path: |
            release/installer-nsis/QuickFinder_Setup_2.1.0.exe
            release/installer-nsis/SHA256SUMS.txt

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout release notes
        uses: actions/checkout@v4

      - name: Download verified build artifact
        uses: actions/download-artifact@v4
        with:
          name: QuickFinder-Windows-2.1.0
          path: release

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            release\QuickFinder_Setup_2.1.0.exe `
            release\SHA256SUMS.txt `
            --title "QuickFinder 2.1.0" `
            --notes-file RELEASE_NOTES_2.1.0.md
